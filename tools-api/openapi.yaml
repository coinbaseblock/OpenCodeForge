openapi: 3.1.0
info:
  title: OpenCodeForge Tools API
  version: 1.0.0
  description: |
    Sandboxed file/git/shell access scoped to a single workspace. Designed to
    be registered as a Tool Server in Open WebUI so the LLM can read, edit
    and execute code inside ./workspace, similar to Claude Code.
servers:
  - url: http://localhost:8088
    description: Local default
  - url: http://tools-api:8088
    description: From inside the docker compose network (open-webui, code-server)
paths:
  /health:
    get:
      operationId: health
      summary: Liveness probe
      responses:
        "200": { description: OK }
  /files:
    get:
      operationId: listFiles
      summary: List directory contents (relative to workspace root)
      parameters:
        - in: query
          name: path
          schema: { type: string, default: "" }
      responses:
        "200": { description: OK }
  /read:
    get:
      operationId: readFile
      summary: Read a text file
      parameters:
        - in: query
          name: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: File contents }
        "404": { description: Not found }
  /write:
    post:
      operationId: writeFile
      summary: Create or overwrite a file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, content]
              properties:
                path:    { type: string }
                content: { type: string }
                mode:
                  type: string
                  enum: [overwrite, create]
                  default: overwrite
      responses:
        "200": { description: Written }
  /patch:
    post:
      operationId: applyPatch
      summary: Apply a unified diff inside the workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [diff]
              properties:
                diff:    { type: string }
                strip:   { type: integer, default: 1 }
                reverse: { type: boolean, default: false }
                cwd:     { type: string, default: "" }
      responses:
        "200": { description: Applied }
        "422": { description: Patch failed }
  /search:
    get:
      operationId: searchWorkspace
      summary: Substring search across the workspace
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: path
          schema: { type: string }
      responses:
        "200": { description: Hits }
  /git/status:
    get:
      operationId: gitStatus
      parameters:
        - in: query
          name: path
          schema: { type: string }
      responses:
        "200": { description: porcelain status }
  /git/diff:
    get:
      operationId: gitDiff
      parameters:
        - in: query
          name: path
          schema: { type: string }
        - in: query
          name: staged
          schema: { type: string, enum: ["true", "false"] }
      responses:
        "200": { description: unified diff }
  /run:
    post:
      operationId: runCommand
      summary: Run an allowlisted shell command in the workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cmd]
              properties:
                cmd:        { type: string, description: "Must start with one of ALLOWED_COMMANDS" }
                cwd:        { type: string, default: "" }
                timeout_ms: { type: integer }
      responses:
        "200": { description: Process result (stdout/stderr/exit_code) }
        "403": { description: Command not allowed }
  /run/policy:
    get:
      operationId: runPolicy
      summary: Inspect the active command allowlist
      responses:
        "200": { description: policy }
